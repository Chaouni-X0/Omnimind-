name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.OMNIMIND_KEYSTORE_BASE64 != '' && secrets.OMNIMIND_KEYSTORE_PASSWORD != '' && secrets.OMNIMIND_KEY_ALIAS != '' && secrets.OMNIMIND_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages with modern sdkmanager
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build debug APKs
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: OmniMind-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Run tests and lint
        run: ./gradlew testDebugUnitTest lintDebug --no-daemon --stacktrace

      - name: Decode release keystore
        if: env.HAS_RELEASE_SIGNING == 'true' && github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.OMNIMIND_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/omnimind-release.jks"

      - name: Build signed release APKs
        if: env.HAS_RELEASE_SIGNING == 'true' && github.event_name != 'pull_request'
        env:
          OMNIMIND_KEYSTORE_PATH: ${{ runner.temp }}/omnimind-release.jks
          OMNIMIND_KEYSTORE_PASSWORD: ${{ secrets.OMNIMIND_KEYSTORE_PASSWORD }}
          OMNIMIND_KEY_ALIAS: ${{ secrets.OMNIMIND_KEY_ALIAS }}
          OMNIMIND_KEY_PASSWORD: ${{ secrets.OMNIMIND_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload signed release APKs
        if: env.HAS_RELEASE_SIGNING == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: OmniMind-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
