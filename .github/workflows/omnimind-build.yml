name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build APK
        working-directory: frontend
        run: eas build --platform android --profile production --non-interactive

      - name: Download APK
        working-directory: frontend
        run: |
          BUILD_ID=$(eas build:list --platform android --profile production --limit 1 --json 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['id'])")
          eas build:download --id "$BUILD_ID" --output-dir ./build-output || true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniMind-android-apk
          path: frontend/build-output/*.apk
          retention-days: 30
          if-no-files-found: warn
